name: sme-backoffice-copilot

services:
  frontend:
    build:
      context: ../frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy

  backend:
    build:
      context: ../backend
    env_file:
      - path: ../.env
        required: false
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')",
        ]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: sme_backoffice
      POSTGRES_USER: sme
      POSTGRES_PASSWORD: sme
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sme -d sme_backoffice"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  postgres_data:
