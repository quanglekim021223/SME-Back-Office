<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32" fill="none">
  <defs>
    <!-- Exact Brand Gradient: Teal (#14b8a6) to Blue (#2563eb) -->
    <linearGradient id="brand-gradient" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#14b8a6" />
      <stop offset="100%" stop-color="#2563eb" />
    </linearGradient>
  </defs>

  <!-- Rounded Brand Rect -->
  <rect width="32" height="32" rx="8" fill="url(#brand-gradient)" />

  <!-- SME Text (Centered, Bold, Clean) -->
  <text x="16" y="21.5" 
        fill="#ffffff" 
        font-family="system-ui, -apple-system, sans-serif" 
        font-size="10.5" 
        font-weight="900" 
        letter-spacing="0.04em" 
        text-anchor="middle">SME</text>
</svg>
